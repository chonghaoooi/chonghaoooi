name: Update Dev Activity Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update dev activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.repository_owner }}
        run: |
          python3 << 'PYEOF'
          import requests, os, re
          from datetime import datetime

          token  = os.environ["GH_TOKEN"]
          actor  = os.environ["GH_ACTOR"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def search(query):
              url = "https://api.github.com/search/issues"
              r = requests.get(url, headers=headers,
                               params={"q": query, "sort": "created",
                                       "order": "desc", "per_page": 5})
              r.raise_for_status()
              return r.json().get("items", [])

          prs    = search(f"is:pr author:{actor} is:public")
          issues = search(f"is:issue author:{actor} is:public")

          combined = sorted(
              prs + issues,
              key=lambda x: x["created_at"],
              reverse=True,
          )[:10]

          lines = ["## \U0001f680 Latest Dev Activity\n",
                   "> _Auto-updated every 6 hours by GitHub Actions_\n"]

          if not combined:
              lines.append("\n_No recent public activity found._\n")
          else:
              for item in combined:
                  icon = "\U0001f4e5" if item.get("pull_request") else "\U0001f41b"
                  date = datetime.strptime(
                      item["created_at"], "%Y-%m-%dT%H:%M:%SZ"
                  ).strftime("%b %d, %Y")
                  parts = item["repository_url"].split("/")
                  repo = parts[-2] + "/" + parts[-1]
                  lines.append(
                      f"- {icon} **[{item['title']}]({item['html_url']})**"
                      f" `{repo}` \u2014 {date}\n"
                  )

          new_section = (
              "<!-- DEV_ACTIVITY_START -->\n"
              + "".join(lines)
              + "<!-- DEV_ACTIVITY_END -->"
          )

          readme_path = "README.md"
          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          pattern = r"<!-- DEV_ACTIVITY_START -->.*?<!-- DEV_ACTIVITY_END -->"
          if re.search(pattern, content, flags=re.DOTALL):
              updated = re.sub(pattern, new_section, content, flags=re.DOTALL)
          else:
              updated = content.rstrip("\n") + "\n\n" + new_section + "\n"

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(updated)

          print("README.md updated successfully.")
          PYEOF

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: update dev activity feed [skip ci]" && git push)
