name: Update Dev Activity Feed

on:
  schedule:
      # Run every 6 hours
          - cron: '0 */6 * * *'
            push:
                branches:
                      - main
                        workflow_dispatch:

                        jobs:
                          update-activity-feed:
                              runs-on: ubuntu-latest
                                  permissions:
                                        contents: write

                                                steps:
                                                      - uses: actions/checkout@v3

                                                                  - name: Fetch Latest Dev Activity
                                                                          id: fetch-activity
                                                                                  uses: actions/github-script@v6
                                                                                          with:
                                                                                                    script: |
                                                                                                                const fs = require('fs');
                                                                                                                            const moment = require('moment');
                                                                                                                                        
                                                                                                                                                    // Fetch user's pull requests
                                                                                                                                                                const prsResponse = await github.rest.search.issuesAndPullRequests({
                                                                                                                                                                              q: `is:pr author:@me is:public`,
                                                                                                                                                                                            sort: 'created',
                                                                                                                                                                                                          order: 'desc',
                                                                                                                                                                                                                        per_page: 5
                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                            // Fetch user's issues
                                                                                                                                                                                                                                                                        const issuesResponse = await github.rest.search.issuesAndPullRequests({
                                                                                                                                                                                                                                                                                      q: `is:issue author:@me is:public`,
                                                                                                                                                                                                                                                                                                    sort: 'created',
                                                                                                                                                                                                                                                                                                                  order: 'desc',
                                                                                                                                                                                                                                                                                                                                per_page: 5
                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                    const prs = prsResponse.data.items || [];
                                                                                                                                                                                                                                                                                                                                                                                const issues = issuesResponse.data.items || [];
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                        // Combine and sort by date
                                                                                                                                                                                                                                                                                                                                                                                                                    const allActivity = [
                                                                                                                                                                                                                                                                                                                                                                                                                                  ...prs.map(pr => ({
                                                                                                                                                                                                                                                                                                                                                                                                                                                  ...pr,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  type: 'pr',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  date: new Date(pr.created_at)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                })),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ...issues.map(issue => ({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ...issue,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              type: 'issue',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              date: new Date(issue.created_at)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ].sort((a, b) => b.date - a.date).slice(0, 10);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Generate markdown content
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let activityContent = '## 🚀 Latest Dev Activity\n\n';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (allActivity.length === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  activityContent += 'No recent public activity.\n';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for (const item of allActivity) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const icon = item.type === 'pr' ? '📝' : '🐛';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const date = moment(item.date).format('MMM DD, YYYY');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            activityContent += `- ${icon} [${item.title}](${item.html_url}) (${date})\n`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              core.setOutput('activity-content', activityContent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          return activityContent;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Update README with Activity Feed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ACTIVITY_CONTENT: ${{ steps.fetch-activity.outputs.activity-content }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Read current README
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    README_PATH="README.md"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ -f "$README_PATH" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Extract content between markers or append to end
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if grep -q "<!-- DEV_ACTIVITY_START -->" "$README_PATH"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Replace existing activity section
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            sed -i '/<!-- DEV_ACTIVITY_START -->/,/<!-- DEV_ACTIVITY_END -->/c\
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <!-- DEV_ACTIVITY_START -->\
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '"${ACTIVITY_CONTENT}"'\
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <!-- DEV_ACTIVITY_END -->' "$README_PATH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Append to end with markers
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "" >> "$README_PATH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "<!-- DEV_ACTIVITY_START -->" >> "$README_PATH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "$ACTIVITY_CONTENT" >> "$README_PATH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "<!-- DEV_ACTIVITY_END -->" >> "$README_PATH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Commit and Push Changes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config --local user.email "action@github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git config --local user.name "GitHub Action"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git add README.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update dev activity feed" && git push)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
