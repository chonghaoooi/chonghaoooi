<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <clipPath id="frame"><rect width="1200" height="320" rx="24"/></clipPath>
    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feFlood flood-color="#3b174f" result="color"/>
      <feComposite in="color" in2="SourceAlpha" operator="in" result="shadow"/>
      <feOffset dx="5" dy="5" in="shadow" result="offset"/>
      <feMerge><feMergeNode in="offset"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Pixel sunset sky -->
    <rect width="1200" height="52" fill="#44205e"/>
    <rect y="52" width="1200" height="46" fill="#73306f"/>
    <rect y="98" width="1200" height="42" fill="#b94d72"/>
    <rect y="140" width="1200" height="40" fill="#ee7d63"/>
    <rect y="180" width="1200" height="28" fill="#ffb35c"/>

    <!-- Pixel sun -->
    <g fill="#ffe07a">
      <rect x="548" y="72" width="104" height="8"/>
      <rect x="532" y="80" width="136" height="12"/>
      <rect x="524" y="92" width="152" height="48"/>
      <rect x="532" y="140" width="136" height="12"/>
      <rect x="548" y="152" width="104" height="8"/>
      <animate attributeName="opacity" values=".92;1;.92" dur="4s" repeatCount="indefinite"/>
    </g>

    <!-- Tiny pixel clouds -->
    <g fill="#ffb1a1" opacity=".75">
      <rect x="158" y="70" width="72" height="8"/><rect x="174" y="62" width="40" height="8"/>
      <rect x="888" y="100" width="112" height="8"/><rect x="912" y="92" width="56" height="8"/>
      <animateTransform attributeName="transform" type="translate" values="-18 0;18 0;-18 0" dur="18s" repeatCount="indefinite"/>
    </g>

    <!-- Ocean -->
    <rect y="208" width="1200" height="58" fill="#165a72"/>
    <rect y="222" width="1200" height="12" fill="#247e8a"/>
    <rect y="246" width="1200" height="20" fill="#103f5b"/>
    <g fill="#63d2c6">
      <rect y="216" width="84" height="6"/><rect x="132" y="216" width="116" height="6"/><rect x="310" y="216" width="72" height="6"/><rect x="458" y="216" width="128" height="6"/><rect x="660" y="216" width="94" height="6"/><rect x="820" y="216" width="132" height="6"/><rect x="1030" y="216" width="100" height="6"/>
      <animateTransform attributeName="transform" type="translate" values="-90 0;20 0;-90 0" dur="5s" repeatCount="indefinite"/>
    </g>
    <g fill="#8ce4d5" opacity=".8">
      <rect x="64" y="238" width="98" height="5"/><rect x="240" y="238" width="54" height="5"/><rect x="376" y="238" width="110" height="5"/><rect x="590" y="238" width="72" height="5"/><rect x="744" y="238" width="120" height="5"/><rect x="970" y="238" width="92" height="5"/>
      <animateTransform attributeName="transform" type="translate" values="25 0;-70 0;25 0" dur="4s" repeatCount="indefinite"/>
    </g>

    <!-- Beach -->
    <rect y="266" width="1200" height="54" fill="#e3a64d"/>
    <rect y="266" width="1200" height="8" fill="#f6d273"/>
    <g fill="#bd743c" opacity=".75">
      <rect x="92" y="294" width="12" height="6"/><rect x="242" y="280" width="8" height="5"/><rect x="704" y="302" width="14" height="6"/><rect x="924" y="286" width="10" height="5"/><rect x="1080" y="306" width="18" height="6"/>
    </g>

    <!-- Left coconut tree, swaying around its base -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-2 172 286;2 172 286;-2 172 286" dur="3.8s" repeatCount="indefinite"/>
      <g fill="#6b3e32"><rect x="158" y="142" width="22" height="144"/><rect x="150" y="190" width="16" height="48"/><rect x="166" y="154" width="22" height="16" fill="#8d5638"/><rect x="158" y="202" width="22" height="14" fill="#8d5638"/><rect x="158" y="252" width="22" height="14" fill="#8d5638"/></g>
      <g fill="#176b55"><rect x="166" y="122" width="18" height="44"/><rect x="112" y="122" width="62" height="18"/><rect x="88" y="132" width="44" height="16"/><rect x="184" y="120" width="64" height="18"/><rect x="224" y="132" width="48" height="16"/><rect x="128" y="96" width="18" height="42"/><rect x="202" y="92" width="18" height="46"/></g>
      <g fill="#29956f"><rect x="98" y="112" width="62" height="12"/><rect x="198" y="106" width="62" height="12"/><rect x="150" y="88" width="16" height="44"/><rect x="182" y="86" width="16" height="44"/></g>
      <g fill="#70402c"><rect x="154" y="128" width="15" height="15"/><rect x="174" y="124" width="15" height="15"/><rect x="192" y="130" width="15" height="15"/></g>
    </g>

    <!-- Left coconut drops once per five-second loop -->
    <rect x="174" y="132" width="15" height="15" fill="#70402c" opacity="0">
      <animate attributeName="y" values="132;132;270;270" keyTimes="0;.18;.72;1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.17;.7;.76;1" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 181 139;0 181 139;540 181 139;540 181 139" keyTimes="0;.18;.72;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <g fill="#f6d273" opacity="0"><rect x="160" y="282" width="10" height="5"/><rect x="194" y="278" width="12" height="5"/><rect x="178" y="288" width="8" height="5"/>
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;.7;.75;.84;1" dur="5s" repeatCount="indefinite"/>
    </g>

    <!-- Right coconut tree -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="2 1032 292;-2 1032 292;2 1032 292" dur="4.2s" repeatCount="indefinite"/>
      <g fill="#6b3e32"><rect x="1020" y="148" width="22" height="144"/><rect x="1012" y="208" width="16" height="42"/><rect x="1028" y="164" width="22" height="14" fill="#8d5638"/><rect x="1020" y="220" width="22" height="14" fill="#8d5638"/><rect x="1020" y="270" width="22" height="14" fill="#8d5638"/></g>
      <g fill="#176b55"><rect x="1028" y="126" width="18" height="42"/><rect x="970" y="124" width="66" height="18"/><rect x="940" y="136" width="50" height="16"/><rect x="1040" y="122" width="70" height="18"/><rect x="1088" y="134" width="46" height="16"/><rect x="990" y="96" width="18" height="44"/><rect x="1064" y="92" width="18" height="48"/></g>
      <g fill="#29956f"><rect x="952" y="114" width="64" height="12"/><rect x="1058" y="108" width="62" height="12"/><rect x="1014" y="88" width="16" height="44"/><rect x="1046" y="86" width="16" height="44"/></g>
      <g fill="#70402c"><rect x="1016" y="130" width="15" height="15"/><rect x="1036" y="126" width="15" height="15"/><rect x="1054" y="132" width="15" height="15"/></g>
    </g>

    <!-- Right coconut drops on the same five-second loop, offset halfway -->
    <rect x="1036" y="134" width="15" height="15" fill="#70402c" opacity="0">
      <animate attributeName="y" values="134;134;274;274" keyTimes="0;.18;.72;1" dur="5s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.17;.7;.76;1" dur="5s" begin="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 1043 141;0 1043 141;-540 1043 141;-540 1043 141" keyTimes="0;.18;.72;1" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Claude relaxing in a pixel beach chair -->
    <g>
      <!-- Chair -->
      <path d="M408 250h18l44 52h-18z" fill="#6b3e32"/>
      <path d="M422 250h82l-38 44h-16z" fill="#fff4dc"/>
      <path d="M432 258h58l-9 10h-41z" fill="#ee7d63"/>
      <path d="M444 274h34l-9 10h-17z" fill="#ee7d63"/>
      <rect x="420" y="300" width="72" height="7" fill="#6b3e32"/>
      <rect x="424" y="306" width="8" height="12" fill="#6b3e32"/>
      <rect x="480" y="306" width="8" height="12" fill="#6b3e32"/>
      <!-- Claude -->
      <g>
        <rect x="438" y="238" width="32" height="30" fill="#d97757"/>
        <rect x="432" y="244" width="44" height="18" fill="#d97757"/>
        <rect x="438" y="234" width="32" height="8" fill="#b94d72"/>
        <rect x="440" y="248" width="13" height="7" fill="#3b174f"/>
        <rect x="458" y="248" width="13" height="7" fill="#3b174f"/>
        <rect x="453" y="250" width="5" height="3" fill="#3b174f"/>
        <rect x="446" y="260" width="18" height="4" fill="#fff4dc"/>
        <path d="M448 268h32l22 28h-38z" fill="#73306f"/>
        <rect x="494" y="278" width="32" height="9" fill="#d97757"/>
        <rect x="520" y="274" width="10" height="13" fill="#d97757"/>
        <rect x="466" y="294" width="44" height="10" fill="#73306f"/>
        <rect x="498" y="302" width="28" height="8" fill="#d97757"/>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="3s" repeatCount="indefinite"/>
      </g>
      <rect x="427" y="309" width="72" height="11" fill="#fff4dc"/>
      <text x="463" y="318" text-anchor="middle" fill="#55234e" font-family="Courier New,monospace" font-size="10" font-weight="700">CLAUDE</text>
    </g>

    <!-- Codex walks over and serves Claude a coconut -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;-112 0;-112 0;0 0;0 0" keyTimes="0;.32;.66;.86;1" dur="8s" repeatCount="indefinite"/>
      <!-- Serving tray -->
      <rect x="684" y="270" width="54" height="6" fill="#fff4dc"/>
      <rect x="704" y="276" width="14" height="5" fill="#8d5638"/>
      <!-- Coconut on tray before handoff -->
      <g>
        <rect x="696" y="248" width="26" height="22" fill="#70402c"/>
        <rect x="701" y="244" width="16" height="6" fill="#fff4dc"/>
        <rect x="714" y="232" width="4" height="16" fill="#ee7d63"/>
        <rect x="718" y="230" width="9" height="4" fill="#ee7d63"/>
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;.5;.56;.88;1" dur="8s" repeatCount="indefinite"/>
      </g>
      <!-- Codex pixel server -->
      <rect x="744" y="232" width="44" height="38" fill="#247e8a"/>
      <rect x="750" y="238" width="32" height="24" fill="#103f5b"/>
      <rect x="756" y="245" width="6" height="6" fill="#8ce4d5"/>
      <rect x="770" y="245" width="6" height="6" fill="#8ce4d5"/>
      <rect x="760" y="255" width="12" height="4" fill="#8ce4d5"/>
      <rect x="764" y="222" width="5" height="10" fill="#3b174f"/>
      <rect x="760" y="218" width="13" height="5" fill="#ffe07a"><animate attributeName="opacity" values="1;.2;1" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="738" y="270" width="56" height="38" fill="#176b55"/>
      <rect x="748" y="278" width="36" height="20" fill="#fff4dc"/>
      <text x="766" y="291" text-anchor="middle" fill="#55234e" font-family="Courier New,monospace" font-size="9" font-weight="700">CODEX</text>
      <rect x="730" y="274" width="12" height="9" fill="#247e8a"/>
      <rect x="790" y="274" width="12" height="9" fill="#247e8a"/>
      <rect x="744" y="306" width="14" height="12" fill="#103f5b"><animate attributeName="y" values="306;302;306" dur=".55s" repeatCount="indefinite"/></rect>
      <rect x="776" y="306" width="14" height="12" fill="#103f5b"><animate attributeName="y" values="302;306;302" dur=".55s" repeatCount="indefinite"/></rect>
    </g>

    <!-- Coconut in Claude's hand after the handoff -->
    <g opacity="0">
      <rect x="526" y="268" width="22" height="20" fill="#70402c"/>
      <rect x="530" y="264" width="14" height="5" fill="#fff4dc"/>
      <rect x="541" y="253" width="4" height="14" fill="#ee7d63"/>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.52;.58;.82;1" dur="8s" repeatCount="indefinite"/>
    </g>

    <!-- Claude's thank-you bubble -->
    <g opacity="0">
      <rect x="494" y="214" width="78" height="24" fill="#3b174f"/>
      <rect x="498" y="210" width="70" height="24" fill="#fff4dc"/>
      <rect x="510" y="234" width="8" height="8" fill="#fff4dc"/>
      <text x="533" y="226" text-anchor="middle" fill="#55234e" font-family="Courier New,monospace" font-size="12" font-weight="700">THANKS!</text>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.58;.64;.78;1" dur="8s" repeatCount="indefinite"/>
    </g>

    <!-- Pixel title -->
    <g filter="url(#text-shadow)" font-family="Courier New,monospace" text-anchor="middle">
      <text x="600" y="118" fill="#fff4dc" font-size="54" font-weight="900" letter-spacing="3">CHONG HAO OOI</text>
      <text x="600" y="162" fill="#fff4dc" font-size="25" font-weight="700" letter-spacing="5">BUILDING FUN PROJECTS</text>
      <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
    </g>

    <!-- Pixel birds -->
    <g fill="none" stroke="#55234e" stroke-width="5"><path d="M760 72l10-7 10 7 10-7 10 7"/><path d="M830 94l8-6 8 6 8-6 8 6"/>
      <animateTransform attributeName="transform" type="translate" values="-20 0;20 -4;-20 0" dur="8s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
