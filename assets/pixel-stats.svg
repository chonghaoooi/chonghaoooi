<svg width="860" height="230" viewBox="0 0 860 230" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Border -->
  <rect width="860" height="230" fill="#3b174f"/>
  <!-- Background -->
  <rect x="4" y="4" width="852" height="222" fill="#fff4dc"/>
  <!-- Header -->
  <rect x="4" y="4" width="852" height="46" fill="#55234e"/>
  <!-- Blinking corner stars -->
  <g fill="#f6d273">
    <rect x="14" y="19" width="18" height="6"/>
    <rect x="20" y="13" width="6" height="18"/>
    <rect x="828" y="19" width="18" height="6"/>
    <rect x="834" y="13" width="6" height="18"/>
    <animate attributeName="opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </g>
  <text x="430" y="33" text-anchor="middle" font-family="Courier New,monospace" font-size="16" font-weight="700" fill="#fff4dc" letter-spacing="3">ADVENTURE STATS</text>

  <!-- Box 1: COMMITS (yellow) -->
  <rect x="12" y="60" width="199" height="96" fill="#f6d273"/>
  <rect x="16" y="64" width="191" height="88" fill="#fff4dc"/>
  <text x="111" y="110" text-anchor="middle" font-family="Courier New,monospace" font-size="38" font-weight="700" fill="#55234e">39</text>
  <text x="111" y="132" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="700" fill="#55234e">COMMITS LAST YEAR</text>

  <!-- Box 2: PULL REQUESTS (coral) -->
  <rect x="219" y="60" width="199" height="96" fill="#ee7d63"/>
  <rect x="223" y="64" width="191" height="88" fill="#fff4dc"/>
  <text x="318" y="110" text-anchor="middle" font-family="Courier New,monospace" font-size="38" font-weight="700" fill="#55234e">13</text>
  <text x="318" y="132" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="700" fill="#55234e">PULL REQUESTS</text>

  <!-- Box 3: CONTRIBUTIONS (teal) -->
  <rect x="426" y="60" width="199" height="96" fill="#247e8a"/>
  <rect x="430" y="64" width="191" height="88" fill="#fff4dc"/>
  <text x="525" y="110" text-anchor="middle" font-family="Courier New,monospace" font-size="38" font-weight="700" fill="#55234e">115</text>
  <text x="525" y="132" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="700" fill="#55234e">CONTRIBUTIONS</text>

  <!-- Box 4: STREAK (magenta) — wider to balance -->
  <rect x="633" y="60" width="215" height="96" fill="#b94d72"/>
  <rect x="637" y="64" width="207" height="88" fill="#fff4dc"/>
  <!-- Pixel flame (pulsing) -->
  <g>
    <rect x="812" y="66" width="10" height="10" fill="#f6d273"/>
    <rect x="808" y="76" width="18" height="10" fill="#ee7d63"/>
    <rect x="804" y="86" width="26" height="8" fill="#b94d72"/>
    <animate attributeName="opacity" values="1;.4;1" dur=".8s" repeatCount="indefinite"/>
  </g>
  <text x="733" y="110" text-anchor="middle" font-family="Courier New,monospace" font-size="38" font-weight="700" fill="#55234e">3</text>
  <text x="733" y="132" text-anchor="middle" font-family="Courier New,monospace" font-size="10" font-weight="700" fill="#55234e">DAY STREAK</text>

  <!-- Language label -->
  <text x="12" y="172" font-family="Courier New,monospace" font-size="10" font-weight="700" fill="#55234e">LANGUAGES</text>

  <!-- Continuous language bar: x=12 to x=848, w=836 -->
  <rect x="12"  y="177" width="308" height="14" fill="#f1e05a"/><!-- JS     36.81% -->
  <rect x="320" y="177" width="182" height="14" fill="#e34c26"/><!-- HTML   21.82% -->
  <rect x="502" y="177" width="119" height="14" fill="#563d7c"/><!-- CSS    14.24% -->
  <rect x="621" y="177" width="109" height="14" fill="#A97BFF"/><!-- Kotlin 12.98% -->
  <rect x="730" y="177" width="82"  height="14" fill="#b07219"/><!-- Java    9.83% -->
  <rect x="812" y="177" width="36"  height="14" fill="#012456"/><!-- PS      4.30% -->

  <!-- Legend (6 items spread across x=12 to x=848) -->
  <rect x="12"  y="203" width="10" height="10" fill="#f1e05a"/>
  <text x="26"  y="213" font-family="Courier New,monospace" font-size="10" fill="#55234e">JS 37%</text>

  <rect x="148" y="203" width="10" height="10" fill="#e34c26"/>
  <text x="162" y="213" font-family="Courier New,monospace" font-size="10" fill="#55234e">HTML 22%</text>

  <rect x="296" y="203" width="10" height="10" fill="#563d7c"/>
  <text x="310" y="213" font-family="Courier New,monospace" font-size="10" fill="#55234e">CSS 14%</text>

  <rect x="432" y="203" width="10" height="10" fill="#A97BFF"/>
  <text x="446" y="213" font-family="Courier New,monospace" font-size="10" fill="#55234e">Kotlin 13%</text>

  <rect x="572" y="203" width="10" height="10" fill="#b07219"/>
  <text x="586" y="213" font-family="Courier New,monospace" font-size="10" fill="#55234e">Java 10%</text>

  <rect x="700" y="203" width="10" height="10" fill="#012456"/>
  <text x="714" y="213" font-family="Courier New,monospace" font-size="10" fill="#55234e">PowerShell 4%</text>
</svg>
