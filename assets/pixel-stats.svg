<svg width="860" height="260" viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Border + bg -->
  <rect width="860" height="260" fill="#3b174f"/>
  <rect x="4" y="4" width="852" height="252" fill="#fff4dc"/>

  <!-- Header -->
  <rect x="4" y="4" width="852" height="46" fill="#55234e"/>
  <g fill="#f6d273">
    <rect x="14" y="19" width="18" height="6"/>
    <rect x="20" y="13" width="6" height="18"/>
    <rect x="828" y="19" width="18" height="6"/>
    <rect x="834" y="13" width="6" height="18"/>
    <animate attributeName="opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </g>
  <text x="430" y="33" text-anchor="middle" font-family="Courier New,monospace" font-size="16" font-weight="700" fill="#fff4dc" letter-spacing="3">ADVENTURE STATS</text>

  <!-- ── BOX 1: COMMITS (yellow) ── -->
  <rect x="12"  y="60" width="199" height="118" fill="#f6d273"/>
  <rect x="16"  y="64" width="191" height="110" fill="#fff4dc"/>
  <rect x="16"  y="64" width="191" height="28"  fill="#f6d273"/>
  <!-- icon: pixel git-commit node (circle + top/bottom connectors) -->
  <rect x="24" y="68" width="6"  height="4"  fill="#55234e"/>
  <rect x="22" y="72" width="10" height="10" fill="#55234e"/>
  <rect x="24" y="82" width="6"  height="4"  fill="#55234e"/>
  <text x="111" y="82" text-anchor="middle" font-family="Courier New,monospace" font-size="11" font-weight="700" fill="#55234e">COMMITS</text>
  <text x="111" y="148" text-anchor="middle" font-family="Courier New,monospace" font-size="44" font-weight="700" fill="#55234e">39</text>
  <text x="111" y="164" text-anchor="middle" font-family="Courier New,monospace" font-size="9"  fill="#55234e">last year</text>

  <!-- ── BOX 2: PULL REQUESTS (coral) ── -->
  <rect x="219" y="60" width="199" height="118" fill="#ee7d63"/>
  <rect x="223" y="64" width="191" height="110" fill="#fff4dc"/>
  <rect x="223" y="64" width="191" height="28"  fill="#ee7d63"/>
  <!-- icon: merge symbol — two branches → one -->
  <rect x="229" y="68" width="4" height="10" fill="#55234e"/>
  <rect x="235" y="68" width="4" height="6"  fill="#55234e"/>
  <rect x="231" y="76" width="4" height="4"  fill="#55234e"/>
  <rect x="232" y="80" width="2" height="6"  fill="#55234e"/>
  <text x="318" y="82" text-anchor="middle" font-family="Courier New,monospace" font-size="11" font-weight="700" fill="#55234e">PULL REQUESTS</text>
  <text x="318" y="148" text-anchor="middle" font-family="Courier New,monospace" font-size="44" font-weight="700" fill="#55234e">13</text>
  <text x="318" y="164" text-anchor="middle" font-family="Courier New,monospace" font-size="9"  fill="#55234e">merged</text>

  <!-- ── BOX 3: CONTRIBUTIONS (teal) ── -->
  <rect x="426" y="60" width="199" height="118" fill="#247e8a"/>
  <rect x="430" y="64" width="191" height="110" fill="#fff4dc"/>
  <rect x="430" y="64" width="191" height="28"  fill="#247e8a"/>
  <!-- icon: 2×2 contribution grid -->
  <rect x="436" y="69" width="5" height="5" fill="#fff4dc"/>
  <rect x="443" y="69" width="5" height="5" fill="#63d2c6"/>
  <rect x="436" y="76" width="5" height="5" fill="#63d2c6"/>
  <rect x="443" y="76" width="5" height="5" fill="#fff4dc"/>
  <text x="525" y="82" text-anchor="middle" font-family="Courier New,monospace" font-size="11" font-weight="700" fill="#fff4dc">CONTRIBUTIONS</text>
  <text x="525" y="148" text-anchor="middle" font-family="Courier New,monospace" font-size="44" font-weight="700" fill="#55234e">115</text>
  <text x="525" y="164" text-anchor="middle" font-family="Courier New,monospace" font-size="9"  fill="#55234e">total</text>

  <!-- ── BOX 4: STREAK (magenta) — wider for balance ── -->
  <rect x="633" y="60" width="215" height="118" fill="#b94d72"/>
  <rect x="637" y="64" width="207" height="110" fill="#fff4dc"/>
  <rect x="637" y="64" width="207" height="28"  fill="#b94d72"/>
  <!-- icon: pixel flame (pulsing) -->
  <g>
    <rect x="643" y="69" width="6"  height="6"  fill="#f6d273"/>
    <rect x="641" y="75" width="10" height="6"  fill="#ee7d63"/>
    <rect x="639" y="81" width="14" height="5"  fill="#b94d72"/>
    <animate attributeName="opacity" values="1;.4;1" dur=".8s" repeatCount="indefinite"/>
  </g>
  <text x="741" y="82" text-anchor="middle" font-family="Courier New,monospace" font-size="11" font-weight="700" fill="#fff4dc">STREAK</text>
  <text x="741" y="148" text-anchor="middle" font-family="Courier New,monospace" font-size="44" font-weight="700" fill="#55234e">3</text>
  <text x="741" y="164" text-anchor="middle" font-family="Courier New,monospace" font-size="9"  fill="#55234e">days · Jun 17–19</text>

  <!-- ── LANGUAGE BAR ── -->
  <text x="12" y="200" font-family="Courier New,monospace" font-size="10" font-weight="700" fill="#55234e">LANGUAGES</text>
  <!-- x=12 → x=848, w=836 -->
  <rect x="12"  y="206" width="308" height="14" fill="#f1e05a"/><!-- JS     36.81% -->
  <rect x="320" y="206" width="182" height="14" fill="#e34c26"/><!-- HTML   21.82% -->
  <rect x="502" y="206" width="119" height="14" fill="#563d7c"/><!-- CSS    14.24% -->
  <rect x="621" y="206" width="109" height="14" fill="#A97BFF"/><!-- Kotlin 12.98% -->
  <rect x="730" y="206" width="82"  height="14" fill="#b07219"/><!-- Java    9.83% -->
  <rect x="812" y="206" width="36"  height="14" fill="#012456"/><!-- PS      4.30% -->

  <!-- Legend -->
  <rect x="12"  y="230" width="10" height="10" fill="#f1e05a"/>
  <text x="26"  y="240" font-family="Courier New,monospace" font-size="10" fill="#55234e">JS 37%</text>

  <rect x="148" y="230" width="10" height="10" fill="#e34c26"/>
  <text x="162" y="240" font-family="Courier New,monospace" font-size="10" fill="#55234e">HTML 22%</text>

  <rect x="296" y="230" width="10" height="10" fill="#563d7c"/>
  <text x="310" y="240" font-family="Courier New,monospace" font-size="10" fill="#55234e">CSS 14%</text>

  <rect x="432" y="230" width="10" height="10" fill="#A97BFF"/>
  <text x="446" y="240" font-family="Courier New,monospace" font-size="10" fill="#55234e">Kotlin 13%</text>

  <rect x="572" y="230" width="10" height="10" fill="#b07219"/>
  <text x="586" y="240" font-family="Courier New,monospace" font-size="10" fill="#55234e">Java 10%</text>

  <rect x="700" y="230" width="10" height="10" fill="#012456"/>
  <text x="714" y="240" font-family="Courier New,monospace" font-size="10" fill="#55234e">PowerShell 4%</text>
</svg>
